<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buffy Store</title>

    <link rel="icon" href="logo.png" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

 <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    background:
    radial-gradient(circle at top left,#d8ffe7 0%,transparent 28%),
    radial-gradient(circle at bottom right,#d5ffe6 0%,transparent 24%),
    #f8faf8;
    overflow-x:hidden;
    color:#111;
}

/* BACKGROUND EFFECTS */

.bg-spray{
    position:fixed;
    border-radius:50%;
    filter:blur(100px);
    z-index:-1;
    opacity:.18;
}

.s1{
    width:320px;
    height:320px;
    background:#0b7a3c;
    top:-120px;
    left:-120px;
}

.s2{
    width:280px;
    height:280px;
    background:#00a651;
    bottom:-100px;
    right:-100px;
}

.s3{
    width:220px;
    height:220px;
    background:#0f5d31;
    top:45%;
    left:45%;
    opacity:.08;
}

/* HEADER */

header{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(0,0,0,.05);
}

.header-inner{
    max-width:1450px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
}

.brand-wrap{
    display:flex;
    align-items:center;
    gap:14px;
}

.logo{
    width:52px;
    height:52px;
    border-radius:18px;
    overflow:hidden;
    background:white;
    box-shadow:
    0 8px 24px rgba(0,0,0,.08);
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.brand{
    font-size:25px;
    font-weight:700;
    letter-spacing:.06em;
}

.brand span{
    color:#0b7a3c;
}

/* SEARCH */

.search-wrap{
    width:100%;
    max-width:500px;
    display:flex;
    align-items:center;
    gap:12px;
}

#search-input{
    flex:1;
    height:52px;
    border:none;
    outline:none;
    border-radius:18px;
    padding:0 18px;
    font-size:15px;
    font-family:'Poppins',sans-serif;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(12px);
    box-shadow:
    0 8px 30px rgba(0,0,0,.05);
    transition:.25s;
}

#search-input:focus{
    box-shadow:
    0 0 0 4px rgba(11,122,60,.12),
    0 8px 30px rgba(0,0,0,.06);
}

#search-btn{
    height:52px;
    border:none;
    padding:0 24px;
    border-radius:18px;
    background:linear-gradient(135deg,#0b7a3c,#065728);
    color:white;
    font-weight:600;
    cursor:pointer;
    font-family:'Poppins',sans-serif;
    transition:.25s;
    box-shadow:
    0 10px 25px rgba(11,122,60,.25);
}

#search-btn:hover{
    transform:translateY(-2px);
}

/* HERO */

.hero{
    max-width:1450px;
    margin:auto;
    padding:28px 20px 10px;
}

.hero-card{
    background:
    linear-gradient(135deg,#0b7a3c,#065728);
    border-radius:34px;
    padding:42px;
    color:white;
    overflow:hidden;
    position:relative;
    box-shadow:
    0 18px 45px rgba(11,122,60,.24);
}

.hero-card::before{
    content:'';
    position:absolute;
    width:260px;
    height:260px;
    background:rgba(255,255,255,.08);
    border-radius:50%;
    top:-80px;
    right:-80px;
}

.hero-title{
    font-size:52px;
    line-height:1;
    font-weight:700;
    margin-bottom:14px;
}

.hero-sub{
    font-size:17px;
    opacity:.92;
    max-width:650px;
}

/* PRODUCTS */

.section{
    max-width:1450px;
    margin:auto;
    padding:30px 20px 100px;
}

.section-title{
    font-size:28px;
    font-weight:700;
    margin-bottom:24px;
}





.products-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:16px;
}

/* PRODUCT CARD */

.product-card{
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    border:1px solid rgba(0,0,0,.06);
    transition:.25s ease;
    box-shadow:
    0 4px 18px rgba(0,0,0,.05);
}

.product-card:hover{
    transform:translateY(-4px);
    box-shadow:
    0 12px 28px rgba(0,0,0,.08);
}

/* IMAGE */

.product-image{
    aspect-ratio:.9;
    overflow:hidden;
    background:#f5f5f5;
    padding:10px;
}

.product-image img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:14px;
    transition:.3s;
}

.product-card:hover img{
    transform:scale(1.03);
}

/* INFO */

.product-info{
    padding:12px;
}

.product-name{
    font-size:13px;
    font-weight:600;
    line-height:1.4;
    margin-bottom:6px;

    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;

    min-height:36px;
}

.product-price{
    font-size:21px;
    font-weight:700;
    color:#0b7a3c;
    margin-bottom:10px;
}

/* SIZES */

.product-sizes{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
}

.size{
    padding:3px 8px;
    border-radius:999px;
    background:#effbf3;
    color:#0b7a3c;
    font-size:10px;
    font-weight:600;
    border:1px solid rgba(11,122,60,.12);
}

/* BUTTON */

.buy-btn{
    margin-top:12px;
    width:100%;
    border:none;
    background:linear-gradient(135deg,#0b7a3c,#065728);
    color:white;
    height:42px;
    border-radius:12px;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
    transition:.25s;
}

.buy-btn:hover{
    transform:translateY(-1px);
}

/* TABLET */

@media (min-width:700px){

    .products-grid{
        grid-template-columns:repeat(3,1fr);
    }

}

/* PC */

@media (min-width:1100px){

    .products-grid{
        grid-template-columns:repeat(4,1fr);
        gap:20px;
    }

}

/* MOBILE */

@media(max-width:480px){

    .products-grid{
        gap:12px;
    }

    .product-info{
        padding:10px;
    }

    .product-price{
        font-size:18px;
    }

    .buy-btn{
        height:40px;
        font-size:12px;
    }

}
/* STATES */

.loading,
.empty{
    padding:80px 20px;
    text-align:center;
    color:#666;
    font-size:15px;
    grid-column:1/-1;
}

/* TABLET */

@media (min-width:700px){

    .products-grid{
        grid-template-columns:repeat(3,1fr);
    }

}

/* DESKTOP */

@media (min-width:1100px){

    .products-grid{
        grid-template-columns:repeat(4,1fr);
        gap:28px;
    }

}

/* MOBILE */

@media(max-width:768px){

    .header-inner{
        flex-direction:column;
        align-items:flex-start;
        gap:16px;
    }

    .search-wrap{
        max-width:100%;
        width:100%;
    }

    .hero-card{
        padding:28px;
        border-radius:26px;
    }

    .hero-title{
        font-size:36px;
    }

    .hero-sub{
        font-size:14px;
    }

}

@media(max-width:480px){

    .products-grid{
        grid-template-columns:repeat(2,1fr);
        gap:14px;
    }

    .product-info{
        padding:14px;
    }

    .product-price{
        font-size:22px;
    }

    .buy-btn{
        height:46px;
        font-size:13px;
    }

}

@media(max-width:360px){

    .products-grid{
        grid-template-columns:1fr;
    }

}

 </style>
</head>

<body>

    <div class="bg-spray s1"></div>
    <div class="bg-spray s2"></div>
    <div class="bg-spray s3"></div>

<header>

    <div class="header-inner">

        <div class="brand-wrap">

            <div class="logo">
                <img src="logo.png">
            </div>

            <div class="brand">
                BUFFY <span>STORE</span>
            </div>

        </div>

        <div class="search-wrap">

            <input type="text" id="search-input" placeholder="Search premium products...">

            <button id="search-btn">
                Search
            </button>

        </div>

    </div>

</header>


    <section class="hero">
        <div class="hero-card">

            <div class="hero-title">
                Premium Fashion
            </div>

            <div class="hero-sub">
                Oversized • Streetwear • Luxury Essentials
            </div>

        </div>
    </section>

    <section class="section">

        <div class="section-title">
            Latest Drops
        </div>

        <div class="products-grid" id="products-grid">

            <div class="loading">
                Loading products...
            </div>

        </div>

    </section>

    <script>

        const SUPABASE_URL = 'https://uclnovtjnnehckpseexf.supabase.co';

        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjbG5vdnRqbm5laGNrcHNlZXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODc5MjAsImV4cCI6MjA5NDc2MzkyMH0.2Di2T1nGrTaCMU48HN-0eQw6M2yV7260-RO2XDFyiI8';

        const db = window.supabase.createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

        const WHATSAPP_NUMBER = '9656686111';

    async function loadProducts(search = '') {

        const grid = document.getElementById('products-grid');

        const { data, error } = await db
            .from('products')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {

            grid.innerHTML = `
<div class="empty">
Failed to load products
</div>
`;

            return;
        }

        let filtered = data || [];

        if (search.trim()) {

            filtered = filtered.filter(product =>
                product.name.toLowerCase().includes(search.toLowerCase())
            );

        }

        if (filtered.length === 0) {

            grid.innerHTML = `
<div class="empty" >
No matching products found
</div>
`;

            return;
        }

        grid.innerHTML = '';

        filtered.forEach(product => {

            const msg = `
🛍️ *BUFFY STORE*

I want this product:

📦 ${product.name}

💰 Price: ₹${product.rate}

📏 Sizes: ${(product.sizes || []).join(', ')}

🖼️ Image:
${product.image_url}
`;

            const whatsappLink =
                `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;

            const card = document.createElement('div');

            card.className = 'product-card';

            card.innerHTML = `

<div class="product-image">
<img src="${product.image_url}" alt="${product.name}">
</div>

<div class="product-info">

<div class="product-name">
${product.name}
</div>

<div class="product-price">
₹${product.rate}
</div>

<div class="product-sizes">
${(product.sizes || []).map(size => `
<div class="size">${size}</div>
`).join('')}
</div>

<button class="buy-btn">
Order on WhatsApp
</button>

</div>
`;

            card.onclick = () => {
                window.open(whatsappLink, '_blank');
            };

            grid.appendChild(card);

        });

    }
        loadProducts();
        const searchInput = document.getElementById('search-input');

            document.getElementById('search-btn')
                .addEventListener('click', () => {

                    loadProducts(searchInput.value);

                });

            searchInput.addEventListener('input', () => {

                loadProducts(searchInput.value);

            });

    </script>

</body>

</html>
